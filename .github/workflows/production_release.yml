name: Production Release
on:
  release:
    types: [published]

jobs:
  release_notification:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Notify Release
        run: echo "Production release ${{ github.event.release.tag_name }} triggered. The macOS host auto-updater will fetch it upon next startup."
