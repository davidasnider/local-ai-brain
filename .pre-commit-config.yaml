repos:
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.4.0
  hooks:
    - id: ruff
      args: [--fix]
    - id: ruff-format
- repo: https://github.com/gitleaks/gitleaks
  rev: v8.18.0
  hooks:
    - id: gitleaks
- repo: local
  hooks:
    - id: pytest-check
      name: pytest check
      entry: pytest
      language: system
      types: [python]
      pass_filenames: false
