# LLM Server Configuration
# Optimized defaults for Qwen 3.6 35B on Apple Silicon.

# --- Core Model Settings ---

# The Hugging Face repo ID to automatically download the model from.
hf_model_repo_id: "unsloth/Qwen3.6-35B-A3B-MTP-GGUF"

# The file pattern or specific filename in the repository.
# Matches the working value from the original start_llm.sh script.
model: "UD-Q4_K_M"

# The number of layers to put on the GPU. Set -1 to move all to GPU.
n_gpu_layers: 99

# The context size (window) for the model.
n_ctx: 98304

# Whether to use flash attention for performance.
flash_attn: true

# --- Performance & Batching ---

# The batch size to use per eval.
n_batch: 2048

# The physical batch size used by llama.cpp.
n_ubatch: 2048

# --- Slots & Speculative Decoding ---

# The number of parallel slots (sequences) to process.
n_parallel: 1

# Maximum number of tokens to draft per step for speculative decoding.
spec_draft_n_max: 2

# Minimum probability for tokens to be drafted in speculative decoding.
spec_draft_p_min: 0.75

# --- Cache Quantization ---

# Type of the key cache quantization (q8_0, f16, etc.)
type_k: "q8_0"

# Type of the value cache quantization (q8_0, f16, etc.)
type_v: "q8_0"
